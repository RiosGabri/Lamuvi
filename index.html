<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página de login</title>

  <link rel="stylesheet" href="Lamuvi/css/global.css">
  <link rel="stylesheet" href="Lamuvi/css/login.css">
  <link rel="stylesheet" href="Lamuvi/css/notificacao.css">
</head>

<body>
  <img src="imagens/logo.png" alt="Lamuvi Logo" class="logo">
  
  <div class="login-box">
    <h1>Login</h1>
    
    <form onsubmit="entrar(event)">
      <label for="usuario_nome">Usuário</label>
      <input type="text" id="usuario_nome" placeholder="Digite seu usuário" required>

      <label for="senha_conta">Senha</label>
      <input type="password" id="senha_conta" placeholder="Digite sua senha" required>

      <p id="erro" role="alert"></p>

      <button type="submit" id="btnLogin">Entrar</button>
    </form>
  </div>

  <div class="container login">
    <p>Não tem conta? <a href="Lamuvi/cadastro.html">Cadastre-se aqui!</a></p>
  </div>

  <script src="Lamuvi/js/login.js"></script>
  <script src="Lamuvi/js/notificacao.js"></script>
</body>

</html>

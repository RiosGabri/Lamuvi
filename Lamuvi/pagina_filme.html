<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhe do filme</title>
    <style>
        body { background-color: #111; color: white; font-family: sans-serif; margin: 0; }
        .container { display: flex; padding: 40px; gap: 40px; }
        #img { width: 300px; border-radius: 10px; }
        .info { max-width: 600px; }
        h1 { color: #e50914; }
        .btn-avaliar { background: gold; color: black; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <nav style="display: flex; justify-content: space-between; padding: 10px; background: #222; color: white; align-items: center;">
    <span style="cursor:pointer" onclick="window.location.href='filmes.html'">Lamuvi</span>
    <div style="display: flex; gap: 10px;">
        <button onclick="window.history.back()" style="cursor: pointer; margin-bottom: 20px;">← Voltar</button>
        <button onclick="irParaPerfil()" style="cursor: pointer; background: #444; color: white; border: none; padding: 5px 10px; border-radius: 4px;">
             Meu Perfil
        </button>
        <button onclick="sair()" style="cursor: pointer; background: red; color: white; border: none; padding: 5px 10px; border-radius: 4px;">
            Sair
        </button>
    </div>
</nav>

    <div class="container">
        <img id="img" src="" alt="Poster">
        <div class="info">
            <h1 id="nome"></h1>
            <p><strong>Gênero:</strong> <span id="genero"></span></p>
            <p><strong>Diretor:</strong> <span id="diretor"></span></p>
            <p><strong>Ano:</strong> <span id="ano"></span></p>
            <p id="sinopse"></p>
        
            <!--button class="btn-avaliar" onclick="irParaAvaliar()">Avaliar Filme</button-->
            <div id="minha-avaliacao-container" style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #333;">
            </div>
        </div>
    </div>
    <script src="js/lista.js"></script>
    <script src="js/pagina_filme.js"></script>
    <script src="js/sair.js"></script>
</body>
</html>

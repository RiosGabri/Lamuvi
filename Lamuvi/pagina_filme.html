<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhe do filme</title>

  <link rel="stylesheet" href="css/global.css"> 
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/pagina_filme.css"> 
  <link rel="stylesheet" href="css/notificacao.css">
</head>

<body>
  <header class="main-header">
    <a href="filmes.html" class="logo"><img src="../imagens/logo.png" alt="Logo Lamuvi"></a>
    <div class="nav-direita">
      <a href="filmes.html" class="nav-link">Catálogo</a>
      <a href="perfil.html" class="nav-link">Perfil</a>
      <button onclick="sair()" class="btn-sair">Sair</button>
    </div>
  </header>

  <div class="container">
    <img id="img" src="" alt="Poster">
    <div class="info">
      <h1 id="nome"></h1>
      <p><strong>Gênero:</strong> <span id="genero"></span></p>
      <p><strong>Diretor:</strong> <span id="diretor"></span></p>
      <p><strong>Ano:</strong> <span id="ano"></span></p>
      <p id="sinopse"></p>

      <div id="minha-avaliacao-container" class="avaliacao-section">
      </div>
    </div>
  </div>

  <div id="modal-confirmacao" class="modal-overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
    <div class="modal-container">
      <h2 id="modal-titulo" class="modal-titulo">Excluir Avaliação?</h2>
      <p class="modal-texto">Você tem certeza de que deseja apagar a sua avaliação deste filme? Esta ação não poderá ser desfeita.</p>
      <div class="modal-botoes">
        <button id="btn-cancelar-modal" class="btn-secundario-modal">Cancelar</button>
        <button id="btn-apagar-modal" class="btn-perigo-modal">Apagar</button>
      </div>
    </div>
  </div>

  <div id="modal-sobrescrever" class="modal-overlay" style="display: none;" role="alertdialog" aria-modal="true" aria-labelledby="modal-sobrescrever-titulo">
    <div class="modal-container">
      <h3 id="modal-sobrescrever-titulo" class="modal-titulo">Substituir avaliação anterior?</h3>
      <p class="modal-texto">Você já avaliou este filme com nota <strong id="nota-anterior" style="color: gold;"></strong>/10 em <strong id="data-anterior"></strong>. Deseja aplicar as novas alterações?</p>
      <div class="modal-botoes">
        <button id="btn-cancelar-sobrescrever" class="btn-secundario-modal">Manter original</button>
        <button id="btn-confirmar-sobrescrever" class="btn-perigo-modal" style="background-color: var(--cor-destaque, #64ffda); color: #000;">Substituir</button>
      </div>
    </div>
  </div>

  <div id="sr-announcer" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0;" aria-live="polite" aria-atomic="true"></div>

  <script src="js/notificacao.js"></script>
  <script src="js/lista.js"></script>
  <script src="js/pagina_filme.js"></script>
  <script src="js/sair.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página de login</title>
  <link rel="stylesheet" href="css/login.css">
</head>

<body>
  <img src="../imagens/logo.png" alt="Lamuvi Logo" class="logo">
  <div class="login-box">
    <h1>Login</h1>
    <input type="text" id="usuario_nome" placeholder="Usuário">
    <input type="password" id="senha_conta" placeholder="Senha">

    <button type="button" onclick="entrar()">Entrar</button>

    <p id="erro" style="color: red;"></p>

    <p>Não tem conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
  </div>

  <script src="js/login.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <link rel="stylesheet" href="css/cadastro.css">
  <link rel="stylesheet" href="css/notificacao.css">
</head>

<body>
  <img src="../imagens/logo.png" alt="Lamuvi Logo" class="logo">
  <div class="cadastro">
    <h1>Cadastro</h1>

    <form id="cadastroForm">
      <label for="nome">Nome</label>
      <input type="text" placeholder="Digite seu nome" id="novo_usuario" required>

      <label for="senha">Senha</label>
      <input type="password" placeholder="Digite sua senha" id="nova_senha" required>

      <label for="senhaConfirma">Confirmar senha</label>
      <input type="password" placeholder="Repita a senha" id="senhaConfirma" required>

      <label class="cadastroCheckbox">
        <input type="checkbox" required>
        <p>Eu concordo com os <a href="#"> Termos de Serviço</a></p>
      </label>

      <button type="button" class="botaoCadastro" onclick="cadastrar()">Cadastrar</button>

    </form>
  </div>

  <div class="container login">
    <p>Já tem uma conta? <a href="login.html">Faça login!</a></p>
  </div>

  <script src="js/notificacao.js"></script>
  <script src="js/cadastro.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuário</title>
  <style>
    body {
      background-color: #111;
      color: white;
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
    }

    .card-avaliacao {
      background: #222;
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 8px;
      display: flex;
      gap: 20px;
      align-items: center;
      border-left: 5px solid gold;
    }

    .info-filme {
      text-align: center;
    }

    .info-filme img {
      width: 80px;
      border-radius: 5px;
    }

    .conteudo-voto {
      flex: 1;
    }

    .btn-excluir {
      background: #e50914;
      color: white;
      border: none;
      padding: 8px;
      cursor: pointer;
      border-radius: 4px;
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      .card-avaliacao {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }

      .info-filme {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .btn-excluir {
        width: 100%;
      }
    }
  </style>
  <link rel="stylesheet" href="css/header.css">
</head>

<body>
  <header class="main-header">
    <a href="filmes.html" class="logo">Lamuvi</a>
    <div class="nav-direita">
      <div class="busca-container">
        <input type="text" class="busca-input" placeholder="Buscar filmes...">
      </div>
      <a href="filmes.html" class="nav-link">Catálogo</a>
      <a href="perfil.html" class="nav-link">Meu Perfil</a>
      <button onclick="sair()" class="btn-sair">Sair</button>
    </div>
  </header>

  <h1>Perfil de <span id="usuario-nome">Usuário</span></h1>

  <section>
    <h3>Minhas Avaliações</h3>
    <div id="minhas-avaliacoes">
    </div>
  </section>
  <script src="js/lista.js"></script>
  <script src="js/perfil.js"></script>
  <script src="js/sair.js"></script>
  <script src="js/busca.js"></script>
</body>

</html>

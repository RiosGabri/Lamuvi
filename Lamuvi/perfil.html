<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil - Lamuvi</title>
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/perfil.css">
  <link rel="stylesheet" href="css/notificacao.css">
</head>

<body>
  <header class="main-header">
    <a href="filmes.html" class="logo">
      <img src="../imagens/logo.png" alt="Logo Lamuvi">
    </a>
    <div class="nav-direita">
      <div class="busca-container">
        <input type="text" class="busca-input" placeholder="Buscar filmes...">
      </div>
      <a href="filmes.html" class="nav-link">Catálogo</a>
      <a href="perfil.html" class="nav-link">Meu Perfil</a>
      <button onclick="sair()" class="btn-sair">Sair</button>
    </div>
  </header>

  <main class="container-perfil">
    <section class="secao-info-usuario">
      <div class="avatar-usuario">
        <img src="../imagens/usuario.png" alt="Avatar do usuário" id="avatar-img">
      </div>
      <div class="dados-usuario">
        <h1>Perfil de <span id="usuario-nome">Usuário</span></h1>
        <p class="email-usuario" id="usuario-email">usuario@email.com</p>
        <div class="estatisticas">
          <div class="stat-item">
            <span class="stat-numero" id="total-avaliacoes">0</span>
            <span class="stat-label">Avaliações</span>
          </div>
          <div class="stat-item">
            <span class="stat-numero" id="media-notas">0.0</span>
            <span class="stat-label">Média</span>
          </div>
        </div>
      </div>
    </section>

    <section class="secao-avaliacoes">
      <div class="header-avaliacoes">
        <h2>Minhas Avaliações</h2>
        <select id="filtro-avaliacoes" class="filtro-select">
          <option value="todas">Todas</option>
          <option value="recentes">Mais Recentes</option>
          <option value="antigas">Mais Antigas</option>
          <option value="maior-nota">Maior Nota</option>
          <option value="menor-nota">Menor Nota</option>
        </select>
      </div>

      <div id="minhas-avaliacoes" class="lista-avaliacoes">
      </div>

      <div id="sem-avaliacoes" class="mensagem-vazia" style="display: none;">
        <p>Você ainda não fez nenhuma avaliação.</p>
        <a href="filmes.html" class="btn-catalogo">Explorar Catálogo</a>
      </div>
    </section>
  </main>

  <script src="js/notificacao.js"></script>
  <script src="js/lista.js"></script>
  <script src="js/perfil.js"></script>
  <script src="js/sair.js"></script>
  <script src="js/busca.js"></script>
</body>

</html>
